<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Lead Scraper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1e2e, #252a3a);
      border-bottom: 1px solid #2d3348;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #58a6ff;
    }

    .header h1 span { color: #8b949e; font-weight: 400; font-size: 14px; margin-left: 8px; }

    .header-actions { display: flex; gap: 10px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 18px;
    }

    .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #e1e4e8; }
    .stat-card .value.accent { color: #58a6ff; }
    .stat-card .value.green { color: #3fb950; }
    .stat-card .value.yellow { color: #d29922; }

    /* Progress bar */
    .progress-container {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .progress-header .phase { font-size: 14px; color: #58a6ff; font-weight: 500; }
    .progress-header .count { font-size: 14px; color: #8b949e; }

    .progress-bar {
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #58a6ff, #3fb950);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* Control panel */
    .controls {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .controls h2 { font-size: 16px; margin-bottom: 16px; color: #c9d1d9; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus, .form-group select:focus { border-color: #58a6ff; }

    .source-checkboxes {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .source-checkboxes label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #c9d1d9;
      cursor: pointer;
    }

    .source-checkboxes input[type="checkbox"] { accent-color: #58a6ff; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #238636; color: #fff; }
    .btn-danger { background: #da3633; color: #fff; }
    .btn-secondary { background: #30363d; color: #c9d1d9; }
    .btn-download { background: #1f6feb; color: #fff; text-decoration: none; display: inline-flex; align-items: center; }

    /* Split layout for log + table */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .split-grid { grid-template-columns: 1fr; }
    }

    /* Log panel */
    .log-panel, .leads-panel {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid #21262d;
      font-size: 14px;
      font-weight: 600;
      color: #c9d1d9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .badge {
      background: #30363d;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      color: #8b949e;
    }

    .log-content {
      height: 360px;
      overflow-y: auto;
      padding: 12px 18px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.7;
    }

    .log-content::-webkit-scrollbar { width: 6px; }
    .log-content::-webkit-scrollbar-track { background: transparent; }
    .log-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .log-line { display: flex; gap: 8px; }
    .log-line .time { color: #484f58; min-width: 65px; }
    .log-line.phase .msg { color: #58a6ff; font-weight: 600; }
    .log-line.success .msg { color: #3fb950; }
    .log-line.warn .msg { color: #d29922; }
    .log-line.error .msg { color: #f85149; }
    .log-line.info .msg { color: #8b949e; }

    /* Leads table */
    .leads-table-wrap {
      height: 360px;
      overflow-y: auto;
    }

    .leads-table-wrap::-webkit-scrollbar { width: 6px; }
    .leads-table-wrap::-webkit-scrollbar-track { background: transparent; }
    .leads-table-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    thead th {
      position: sticky;
      top: 0;
      background: #161b22;
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
    }

    tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #1b2029;
      color: #c9d1d9;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:hover { background: #1c2129; }

    .badge-personal { background: #238636; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    .badge-generic { background: #6e4000; color: #d29922; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

    .quality-dots { display: flex; gap: 3px; }
    .quality-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #21262d;
    }
    .quality-dot.filled { background: #3fb950; }
    .quality-dot.filled.mid { background: #d29922; }
    .quality-dot.filled.low { background: #f85149; }

    .resume-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #c9d1d9;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Helix Lead Scraper <span>Dashboard</span></h1>
  <div class="header-actions">
    <a href="/api/download" class="btn btn-download" id="downloadBtn">Download CSV</a>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Leads Found</div>
      <div class="value accent" id="statLeads">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Personal Emails</div>
      <div class="value green" id="statPersonal">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Generic Emails</div>
      <div class="value yellow" id="statGeneric">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Domains Scraped</div>
      <div class="value" id="statDomains">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Time Elapsed</div>
      <div class="value" id="statTime">0s</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-container">
    <div class="progress-header">
      <span class="phase" id="phaseLabel">Idle</span>
      <span class="count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <h2>Configuration</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Target Leads</label>
        <input type="number" id="inputTarget" value="1000" min="1" max="10000">
      </div>
      <div class="form-group">
        <label>Industry Filter</label>
        <select id="inputIndustry">
          <option value="">All Industries</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location Filter</label>
        <select id="inputLocation">
          <option value="">All Locations</option>
        </select>
      </div>
    </div>

    <label style="font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px;">Sources</label>
    <div class="source-checkboxes" id="sourceChecks">
      <label><input type="checkbox" value="yellowpages" checked> Yellow Pages</label>
      <label><input type="checkbox" value="truelocal" checked> TrueLocal</label>
      <label><input type="checkbox" value="hotfrog" checked> Hotfrog</label>
      <label><input type="checkbox" value="duckduckgo" checked> DuckDuckGo</label>
      <label><input type="checkbox" value="bing" checked> Bing</label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnStart">Start Scraping</button>
      <button class="btn btn-primary" id="btnResume" style="background: #1f6feb;">Resume</button>
      <button class="btn btn-danger" id="btnStop" disabled>Stop</button>
    </div>
  </div>

  <!-- Log + Leads table -->
  <div class="split-grid">
    <div class="log-panel">
      <div class="panel-header">
        Activity Log
        <span class="badge" id="logCount">0</span>
      </div>
      <div class="log-content" id="logContent"></div>
    </div>

    <div class="leads-panel">
      <div class="panel-header">
        Recent Leads
        <span class="badge" id="leadTableCount">0</span>
      </div>
      <div class="leads-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Company</th>
              <th>Type</th>
              <th>Q</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  let eventSource = null;
  let logLines = 0;

  // Load options
  fetch('/api/options')
    .then(r => r.json())
    .then(data => {
      const indSel = $('inputIndustry');
      data.industries.forEach(i => {
        const opt = document.createElement('option');
        opt.value = i.slug;
        opt.textContent = i.label;
        indSel.appendChild(opt);
      });
      const locSel = $('inputLocation');
      data.locations.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.slug;
        opt.textContent = `${l.label} (${l.state})`;
        locSel.appendChild(opt);
      });
    });

  // Load current status
  fetch('/api/status')
    .then(r => r.json())
    .then(status => {
      if (status.running) {
        setRunningUI(true);
        updateStats(status);
      }
    });

  function getSelectedSources() {
    return [...document.querySelectorAll('#sourceChecks input:checked')].map(cb => cb.value);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60);
    const rs = s % 60;
    if (m < 60) return m + 'm ' + rs + 's';
    const h = Math.floor(m / 60);
    const rm = m % 60;
    return h + 'h ' + rm + 'm';
  }

  function phaseLabel(phase) {
    const labels = {
      idle: 'Idle',
      init: 'Initializing...',
      phase1: 'Phase 1 — Directory Scraping',
      phase2: 'Phase 2 — Email Extraction',
      phase3: 'Phase 3 — Search Scraping',
      done: 'Complete',
      error: 'Error'
    };
    return labels[phase] || phase;
  }

  function updateStats(status) {
    $('statLeads').textContent = status.leadCount || 0;
    $('statPersonal').textContent = status.personalCount || 0;
    $('statGeneric').textContent = status.genericCount || 0;
    $('statDomains').textContent = status.domainsScraped || 0;
    $('statTime').textContent = formatTime(status.elapsed || 0);

    const target = status.target || 1;
    const pct = Math.min(100, Math.round((status.leadCount / target) * 100));
    $('progressFill').style.width = pct + '%';
    $('phaseLabel').textContent = phaseLabel(status.phase);
    $('progressCount').textContent = `${status.leadCount} / ${target}`;
  }

  function addLogLine(entry) {
    const el = document.createElement('div');
    el.className = 'log-line ' + (entry.type || 'info');

    const time = new Date().toLocaleTimeString('en-AU', { hour12: false });
    el.innerHTML = `<span class="time">${time}</span><span class="msg">${escapeHtml(entry.message)}</span>`;

    const log = $('logContent');
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    logLines++;
    $('logCount').textContent = logLines;
  }

  function addLeadRow(lead) {
    const tbody = $('leadsBody');
    const tr = document.createElement('tr');

    const typeBadge = lead.emailType === 'personal'
      ? '<span class="badge-personal">personal</span>'
      : '<span class="badge-generic">generic</span>';

    const q = lead.qualityScore || 0;
    let dots = '';
    for (let i = 1; i <= 5; i++) {
      const cls = i <= q ? (q >= 4 ? 'filled' : q >= 2 ? 'filled mid' : 'filled low') : '';
      dots += `<div class="quality-dot ${cls}"></div>`;
    }

    tr.innerHTML = `
      <td title="${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</td>
      <td title="${escapeHtml(lead.companyName)}">${escapeHtml(lead.companyName || '—')}</td>
      <td>${typeBadge}</td>
      <td><div class="quality-dots">${dots}</div></td>
      <td>${escapeHtml(lead.source || '')}</td>
    `;

    // Insert at top
    tbody.insertBefore(tr, tbody.firstChild);

    // Keep max 100 rows
    while (tbody.children.length > 100) {
      tbody.removeChild(tbody.lastChild);
    }

    $('leadTableCount').textContent = tbody.children.length;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function connectSSE() {
    if (eventSource) eventSource.close();

    eventSource = new EventSource('/api/events');

    eventSource.addEventListener('progress', (e) => {
      updateStats(JSON.parse(e.data));
    });

    eventSource.addEventListener('lead', (e) => {
      addLeadRow(JSON.parse(e.data));
    });

    eventSource.addEventListener('log', (e) => {
      addLogLine(JSON.parse(e.data));
    });

    eventSource.addEventListener('done', (e) => {
      const status = JSON.parse(e.data);
      updateStats(status);
      setRunningUI(false);
      addLogLine({ type: 'phase', message: 'Scraping complete!' });
    });

    eventSource.addEventListener('error', (e) => {
      try {
        const data = JSON.parse(e.data);
        addLogLine({ type: 'error', message: data.message });
      } catch {}
      setRunningUI(false);
    });
  }

  function setRunningUI(running) {
    $('btnStart').disabled = running;
    $('btnResume').disabled = running;
    $('btnStop').disabled = !running;
    $('inputTarget').disabled = running;
    $('inputIndustry').disabled = running;
    $('inputLocation').disabled = running;
    document.querySelectorAll('#sourceChecks input').forEach(cb => cb.disabled = running);
  }

  async function startScraper(resume) {
    const body = {
      target: parseInt($('inputTarget').value, 10) || 1000,
      resume,
      sources: getSelectedSources(),
      industry: $('inputIndustry').value || null,
      location: $('inputLocation').value || null
    };

    try {
      const resp = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await resp.json();

      if (!resp.ok) {
        addLogLine({ type: 'error', message: data.error || 'Failed to start' });
        return;
      }

      setRunningUI(true);
      connectSSE();
      addLogLine({ type: 'phase', message: `Starting scraper — target: ${body.target} leads` });
    } catch (err) {
      addLogLine({ type: 'error', message: 'Network error: ' + err.message });
    }
  }

  $('btnStart').addEventListener('click', () => startScraper(false));
  $('btnResume').addEventListener('click', () => startScraper(true));

  $('btnStop').addEventListener('click', async () => {
    try {
      await fetch('/api/stop', { method: 'POST' });
      addLogLine({ type: 'warn', message: 'Stop requested...' });
    } catch (err) {
      addLogLine({ type: 'error', message: 'Failed to stop: ' + err.message });
    }
  });

  // Connect SSE on page load
  connectSSE();
</script>

</body>
</html>
