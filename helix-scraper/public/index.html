<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Outreach</title>
  <link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1775285198680-f6aff5b3-8565-4dfe-9136-83b95958fffa.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d4d4;
      --primary-dim: rgba(0, 212, 212, 0.15);
      --primary-glow: rgba(0, 212, 212, 0.08);
      --primary-border: rgba(0, 212, 212, 0.3);
      --bg: #0a0a0f;
      --bg-surface: rgba(255, 255, 255, 0.03);
      --bg-glass: rgba(255, 255, 255, 0.04);
      --bg-glass-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.5);
      --text-dim: rgba(255, 255, 255, 0.25);
      --green: #3fb950;
      --green-dim: rgba(63, 185, 80, 0.15);
      --yellow: #d29922;
      --yellow-dim: rgba(210, 153, 34, 0.15);
      --red: #f85149;
      --red-dim: rgba(248, 81, 73, 0.15);
      --orange: #e85d3a;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-pill: 100px;
      --glass-blur: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══ Background Effects ═══ */
    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(0, 212, 212, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 8s ease-in-out infinite;
    }

    .bg-glow-2 {
      position: fixed;
      bottom: -300px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 212, 212, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 10s ease-in-out infinite reverse;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    /* ═══ Orbit decoration ═══ */
    .orbit-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 212, 212, 0.04);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .orbit-ring:nth-child(1) { width: 500px; height: 500px; animation: orbit-spin 60s linear infinite; }
    .orbit-ring:nth-child(2) { width: 800px; height: 800px; animation: orbit-spin 90s linear infinite reverse; }
    .orbit-ring:nth-child(3) { width: 1100px; height: 1100px; animation: orbit-spin 120s linear infinite; }

    @keyframes orbit-spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ═══ Glass Card ═══ */
    .glass {
      background: var(--bg-glass);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all var(--transition);
    }

    .glass:hover {
      background: var(--bg-glass-hover);
      border-color: var(--border-light);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
    }

    /* ═══ Header ═══ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px 4px 10px 10px;
      object-fit: cover;
      display: block;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 212, 0.2); }
      50% { box-shadow: 0 0 30px rgba(0, 212, 212, 0.4); }
    }

    .header h1 { font-size: 20px; font-weight: 700; }
    .header h1 span { color: var(--primary); }
    .header-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }

    /* ═══ Layout ═══ */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ═══ Stats Grid ═══ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      padding: 20px;
      position: relative;
      overflow: hidden;
      animation: fade-up 0.5s ease both;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-border), transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .stat-card:hover::before { opacity: 1; }

    .stat-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      transition: transform var(--transition-bounce);
    }

    .stat-card:hover .value { transform: scale(1.05); }

    .stat-card .value.teal { color: var(--primary); }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.yellow { color: var(--yellow); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card:nth-child(1) { animation-delay: 0s; }
    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }
    .stat-card:nth-child(4) { animation-delay: 0.15s; }
    .stat-card:nth-child(5) { animation-delay: 0.2s; }

    /* ═══ Progress ═══ */
    .progress-section {
      padding: 22px 24px;
      margin-bottom: 24px;
      animation: fade-up 0.5s ease 0.25s both;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--primary-dim);
      border: 1px solid var(--primary-border);
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      transition: all var(--transition);
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }

    .phase-dot.active { animation: pulse-dot 1.5s ease-in-out infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }

    .progress-count { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    .progress-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--primary), #00f0f0);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 40px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3));
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ═══ Controls ═══ */
    .controls-section {
      padding: 28px;
      margin-bottom: 24px;
      animation: fade-up 0.5s ease 0.3s both;
    }

    .controls-header {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls-header::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary-border);
      background: rgba(0, 212, 212, 0.04);
      box-shadow: 0 0 0 3px rgba(0, 212, 212, 0.06);
    }

    .form-group select option { background: #1a1a2e; color: var(--text); }

    .source-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .source-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--bg-glass);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .source-chip:hover { border-color: var(--border-light); background: var(--bg-glass-hover); }

    .source-chip.active {
      border-color: var(--primary-border);
      background: var(--primary-dim);
      color: var(--primary);
    }

    .source-chip input { display: none; }

    .source-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all var(--transition);
    }

    .source-chip.active .source-dot { background: var(--primary); box-shadow: 0 0 8px rgba(0, 212, 212, 0.5); }

    /* ═══ Buttons ═══ */
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-pill);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn:disabled::after { display: none; }

    .btn-primary {
      background: var(--primary);
      color: var(--bg);
      box-shadow: 0 4px 20px rgba(0, 212, 212, 0.25);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(0, 212, 212, 0.4); }

    .btn-resume {
      background: rgba(0, 212, 212, 0.12);
      color: var(--primary);
      border: 1px solid var(--primary-border);
    }
    .btn-resume:hover { background: rgba(0, 212, 212, 0.2); }

    .btn-stop {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }
    .btn-stop:hover { background: rgba(248, 81, 73, 0.25); box-shadow: 0 4px 20px rgba(248, 81, 73, 0.15); }

    .btn-download {
      background: var(--bg-glass);
      color: var(--text);
      border: 1px solid var(--border);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      font-size: 13px;
      border-radius: var(--radius-pill);
    }
    .btn-download:hover { border-color: var(--primary-border); color: var(--primary); }

    .btn-download svg { width: 16px; height: 16px; }

    /* ═══ Split panels ═══ */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 960px) { .split-grid { grid-template-columns: 1fr; } }

    .panel {
      overflow: hidden;
      animation: fade-up 0.5s ease 0.4s both;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .panel-badge {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: var(--bg-glass);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
    }

    /* ═══ Log ═══ */
    .log-scroll {
      height: 400px;
      overflow-y: auto;
      padding: 14px 20px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.8;
    }

    .log-scroll::-webkit-scrollbar { width: 4px; }
    .log-scroll::-webkit-scrollbar-track { background: transparent; }
    .log-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .log-entry {
      display: flex;
      gap: 10px;
      animation: log-in 0.3s ease both;
    }

    @keyframes log-in {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .log-time { color: rgba(255,255,255,0.15); min-width: 60px; font-variant-numeric: tabular-nums; }
    .log-entry.phase .log-msg { color: var(--primary); font-weight: 600; }
    .log-entry.success .log-msg { color: var(--green); }
    .log-entry.warn .log-msg { color: var(--yellow); }
    .log-entry.error .log-msg { color: var(--red); }
    .log-entry.info .log-msg { color: var(--text-muted); }

    /* ═══ Leads Table ═══ */
    .table-scroll {
      height: 400px;
      overflow-y: auto;
    }

    .table-scroll::-webkit-scrollbar { width: 4px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text-muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background var(--transition);
    }

    tbody tr { animation: log-in 0.3s ease both; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .type-badge {
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .type-personal { background: var(--green-dim); color: var(--green); }
    .type-generic { background: var(--yellow-dim); color: var(--yellow); }

    .quality-bar { display: flex; gap: 3px; align-items: center; }

    .q-pip {
      width: 6px;
      height: 14px;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      transition: background var(--transition);
    }

    .q-pip.on { background: var(--primary); }
    .q-pip.on.mid { background: var(--yellow); }
    .q-pip.on.low { background: var(--red); }

    /* ═══ Empty state ═══ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; }
  </style>
</head>
<body>

<!-- Background effects -->
<div class="bg-glow"></div>
<div class="bg-glow-2"></div>
<div class="orbit-ring"></div>
<div class="orbit-ring"></div>
<div class="orbit-ring"></div>

<!-- Header -->
<div class="header">
  <div class="header-brand">
    <img class="header-logo" src="https://image2url.com/r2/default/images/1775285198680-f6aff5b3-8565-4dfe-9136-83b95958fffa.png" alt="Helix logo">
    <div>
      <h1><span>Helix</span> Outreach</h1>
    </div>
  </div>
  <a href="/api/download" class="btn btn-download" id="downloadBtn">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    Download CSV
  </a>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card glass">
      <div class="label">Leads Found</div>
      <div class="value teal" id="statLeads">0</div>
    </div>
    <div class="stat-card glass">
      <div class="label">Personal Emails</div>
      <div class="value green" id="statPersonal">0</div>
    </div>
    <div class="stat-card glass">
      <div class="label">Generic Emails</div>
      <div class="value yellow" id="statGeneric">0</div>
    </div>
    <div class="stat-card glass">
      <div class="label">Domains Scraped</div>
      <div class="value" id="statDomains">0</div>
    </div>
    <div class="stat-card glass">
      <div class="label">Time Elapsed</div>
      <div class="value" id="statTime" style="font-size: 24px;">0s</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section glass">
    <div class="progress-top">
      <div class="phase-badge">
        <div class="phase-dot" id="phaseDot"></div>
        <span id="phaseLabel">Idle</span>
      </div>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-section glass-strong">
    <div class="controls-header">Configuration</div>

    <div class="form-grid">
      <div class="form-group">
        <label>Target Leads</label>
        <input type="number" id="inputTarget" value="1000" min="1" max="10000">
      </div>
      <div class="form-group">
        <label>Industry</label>
        <select id="inputIndustry"><option value="">All Industries</option></select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <select id="inputLocation"><option value="">All Locations</option></select>
      </div>
    </div>

    <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); display: block; margin-bottom: 10px;">Sources</label>
    <div class="source-row" id="sourceRow">
      <label class="source-chip active" data-source="yellowpages"><input type="checkbox" value="yellowpages" checked><div class="source-dot"></div>Yellow Pages</label>
      <label class="source-chip active" data-source="truelocal"><input type="checkbox" value="truelocal" checked><div class="source-dot"></div>TrueLocal</label>
      <label class="source-chip active" data-source="hotfrog"><input type="checkbox" value="hotfrog" checked><div class="source-dot"></div>Hotfrog</label>
      <label class="source-chip active" data-source="duckduckgo"><input type="checkbox" value="duckduckgo" checked><div class="source-dot"></div>DuckDuckGo</label>
      <label class="source-chip active" data-source="bing"><input type="checkbox" value="bing" checked><div class="source-dot"></div>Bing</label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnStart">Start Scraping</button>
      <button class="btn btn-resume" id="btnResume">Resume</button>
      <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
    </div>
  </div>

  <!-- Log + Leads -->
  <div class="split-grid">
    <div class="panel glass">
      <div class="panel-header">
        <span class="panel-title">Activity Log</span>
        <span class="panel-badge" id="logCount">0</span>
      </div>
      <div class="log-scroll" id="logContent"></div>
    </div>
    <div class="panel glass">
      <div class="panel-header">
        <span class="panel-title">Recent Leads</span>
        <span class="panel-badge" id="leadTableCount">0</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Company</th>
              <th>Type</th>
              <th>Quality</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  let eventSource = null;
  let logLines = 0;

  // Source chip toggle
  document.querySelectorAll('.source-chip').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.preventDefault();
      const cb = chip.querySelector('input');
      cb.checked = !cb.checked;
      chip.classList.toggle('active', cb.checked);
    });
  });

  // Load options
  fetch('/api/options').then(r => r.json()).then(data => {
    const indSel = $('inputIndustry');
    data.industries.forEach(i => {
      const o = document.createElement('option');
      o.value = i.slug; o.textContent = i.label;
      indSel.appendChild(o);
    });
    const locSel = $('inputLocation');
    data.locations.forEach(l => {
      const o = document.createElement('option');
      o.value = l.slug; o.textContent = `${l.label} (${l.state})`;
      locSel.appendChild(o);
    });
  });

  // Status on load
  fetch('/api/status').then(r => r.json()).then(s => {
    if (s.running) { setRunningUI(true); updateStats(s); }
  });

  function getSelectedSources() {
    return [...document.querySelectorAll('.source-chip input:checked')].map(cb => cb.value);
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60), rs = s % 60;
    if (m < 60) return m + 'm ' + rs + 's';
    return Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
  }

  function phaseText(p) {
    return { idle: 'Idle', init: 'Initializing...', phase1: 'Phase 1 — Directories', phase2: 'Phase 2 — Emails', phase3: 'Phase 3 — Search', done: 'Complete', error: 'Error' }[p] || p;
  }

  function updateStats(s) {
    animateValue($('statLeads'), s.leadCount || 0);
    animateValue($('statPersonal'), s.personalCount || 0);
    animateValue($('statGeneric'), s.genericCount || 0);
    animateValue($('statDomains'), s.domainsScraped || 0);
    $('statTime').textContent = formatTime(s.elapsed || 0);

    const pct = Math.min(100, Math.round(((s.leadCount || 0) / (s.target || 1)) * 100));
    $('progressFill').style.width = pct + '%';
    $('phaseLabel').textContent = phaseText(s.phase);
    $('progressCount').textContent = `${s.leadCount || 0} / ${s.target || 0}`;

    const dot = $('phaseDot');
    dot.classList.toggle('active', s.running);
  }

  function animateValue(el, newVal) {
    const cur = parseInt(el.textContent) || 0;
    if (cur === newVal) return;
    el.textContent = newVal;
    el.style.transform = 'scale(1.15)';
    setTimeout(() => el.style.transform = 'scale(1)', 200);
  }

  function addLog(entry) {
    const el = document.createElement('div');
    el.className = 'log-entry ' + (entry.type || 'info');
    const t = new Date().toLocaleTimeString('en-AU', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    el.innerHTML = `<span class="log-time">${t}</span><span class="log-msg">${esc(entry.message)}</span>`;
    const log = $('logContent');
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    logLines++;
    $('logCount').textContent = logLines;
  }

  function addLeadRow(lead) {
    const tbody = $('leadsBody');
    const tr = document.createElement('tr');
    const typeCls = lead.emailType === 'personal' ? 'type-personal' : 'type-generic';
    const q = lead.qualityScore || 0;
    let pips = '';
    for (let i = 1; i <= 5; i++) {
      const cls = i <= q ? (q >= 4 ? 'on' : q >= 2 ? 'on mid' : 'on low') : '';
      pips += `<div class="q-pip ${cls}"></div>`;
    }
    tr.innerHTML = `
      <td title="${esc(lead.email)}">${esc(lead.email)}</td>
      <td title="${esc(lead.companyName)}">${esc(lead.companyName || '—')}</td>
      <td><span class="type-badge ${typeCls}">${lead.emailType}</span></td>
      <td><div class="quality-bar">${pips}</div></td>
      <td>${esc(lead.source || '')}</td>`;
    tbody.insertBefore(tr, tbody.firstChild);
    while (tbody.children.length > 100) tbody.removeChild(tbody.lastChild);
    $('leadTableCount').textContent = tbody.children.length;
  }

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function connectSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/events');
    eventSource.addEventListener('progress', e => updateStats(JSON.parse(e.data)));
    eventSource.addEventListener('lead', e => addLeadRow(JSON.parse(e.data)));
    eventSource.addEventListener('log', e => addLog(JSON.parse(e.data)));
    eventSource.addEventListener('done', e => { updateStats(JSON.parse(e.data)); setRunningUI(false); addLog({ type: 'phase', message: 'Scraping complete!' }); });
    eventSource.addEventListener('error', e => { try { addLog({ type: 'error', message: JSON.parse(e.data).message }); } catch {} setRunningUI(false); });
  }

  function setRunningUI(running) {
    $('btnStart').disabled = running;
    $('btnResume').disabled = running;
    $('btnStop').disabled = !running;
    $('inputTarget').disabled = running;
    $('inputIndustry').disabled = running;
    $('inputLocation').disabled = running;
    document.querySelectorAll('.source-chip').forEach(c => {
      c.style.pointerEvents = running ? 'none' : '';
      c.style.opacity = running ? '0.5' : '';
    });
  }

  async function startScraper(resume) {
    const body = {
      target: parseInt($('inputTarget').value, 10) || 1000,
      resume,
      sources: getSelectedSources(),
      industry: $('inputIndustry').value || null,
      location: $('inputLocation').value || null
    };
    try {
      const r = await fetch('/api/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const d = await r.json();
      if (!r.ok) { addLog({ type: 'error', message: d.error || 'Failed to start' }); return; }
      setRunningUI(true);
      connectSSE();
      addLog({ type: 'phase', message: `Starting — target ${body.target} leads` });
    } catch (err) { addLog({ type: 'error', message: 'Network error: ' + err.message }); }
  }

  $('btnStart').addEventListener('click', () => startScraper(false));
  $('btnResume').addEventListener('click', () => startScraper(true));
  $('btnStop').addEventListener('click', async () => {
    try { await fetch('/api/stop', { method: 'POST' }); addLog({ type: 'warn', message: 'Stop requested...' }); } catch (e) { addLog({ type: 'error', message: e.message }); }
  });

  async function loadExistingLeads() {
    try {
      const res = await fetch('/api/leads');
      const { leads } = await res.json();
      if (!leads || leads.length === 0) return;
      // Show most recent 100, oldest first so newest ends up at top
      const toShow = leads.slice(-100);
      toShow.forEach(lead => addLeadRow(lead));
      $('leadTableCount').textContent = leads.length > 100
        ? `${leads.length} total (showing latest 100)`
        : leads.length;
    } catch {}
  }

  connectSSE();
  loadExistingLeads();
</script>
</body>
</html>
